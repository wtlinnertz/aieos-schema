# Schema for PCR (SDK — Layer 1)
artifact_type: PCR
kit: SDK
layer: 1
spec_version: "v1.0"
entry_gate: false

hard_gates:
  - name: theme_coverage
    rule: "Every capability in §3 belongs to a strategic theme defined in §2; no orphan capabilities exist"
  - name: timeframe_assigned
    rule: "Every capability in §3 has a target timeframe (quarter, half, or year); entries marked backlog include a justification for unbounded timeframe"
  - name: dependency_mapped
    rule: "Dependencies in §4 are bidirectional; if A depends on B, B lists A as dependent; no one-directional dependency references"
  - name: confidence_justified
    rule: "Every capability in §3 has a confidence classification (committed/planned/exploratory) with rationale; committed capabilities reference a frozen CLA entry or frozen SBR"
  - name: lifecycle_linked
    rule: "Every enhance or maintain capability traces to a CLA entry; every new capability traces to an ideation output, market signal, or strategic directive"
  - name: capacity_realistic
    rule: "Total effort of committed + planned capabilities in §3 does not exceed stated capacity in §5; overcommitment fails"

required_sections:
  - name: "§1 Document Control"
    required: true
  - name: "§2 Strategic Themes"
    required: true
  - name: "§3 Capability Roadmap"
    required: true
  - name: "§4 Dependency Map"
    required: true
  - name: "§5 Capacity Assumptions"
    required: true
  - name: "§6 Risks and Unknowns"
    required: true

file_paths:
  spec: "docs/specs/pcr-spec.md"
  template: "docs/artifacts/pcr-template.md"
  prompt: "docs/prompts/pcr-prompt.md"
  validator: "docs/validators/pcr-validator.md"

upstream_dependencies:
  - artifact_type: CLA
    condition: "frozen"

downstream_consumers:
  - artifact_type: SBR
    kit: SDK
  - artifact_type: TIR
    kit: SDK
