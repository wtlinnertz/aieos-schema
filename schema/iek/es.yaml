# Schema for ES (IEK — Layer 7)
artifact_type: ES
kit: IEK
layer: 7
spec_version: "v1.2"
entry_gate: false

hard_gates:
  - name: coverage_adequacy
    rule: "The ES references at least 2 frozen RHRs as input; §2 Coverage Summary table has at least 2 rows; coverage period is stated; gaps in coverage are explicitly noted"
  - name: inputs_frozen
    rule: "Every artifact cited in §1 Document Control (RHRs, SRPs, and any cited VH) is confirmed in Frozen status"
  - name: vh_assessment_explicit
    rule: "§3 is not blank; it either contains a complete VH outcome assessment (with SM-N metrics mapped to observed data and an overall verdict) or contains exactly 'VH not provided; outcome assessment deferred'"
  - name: re_entry_signal_valid
    rule: "§6 contains exactly one of the three valid signals: maintain, watch, or re-discover; the signal is followed by a rationale of 2–4 sentences; if re-discover, the rationale includes a discovery question"
  - name: actions_present
    rule: "§7 contains at least one recommended action with: action description, type (Operational / Discovery / Engineering), rationale, and owner (which may be TBD)"
  - name: adoption_evidence_explicit
    rule: "§8 is not blank; it either contains adoption metrics (usage metrics with source, adoption rate with target base, adoption trend, support signal) or contains an explicit 'Not applicable' statement for non-user-facing initiatives"

required_sections:
  - name: "§1 Document Control"
    required: true
  - name: "§2 Coverage Summary"
    required: true
  - name: "§3 VH Outcome Assessment"
    required: true
  - name: "§4 Reliability Trend Analysis"
    required: true
  - name: "§5 Pattern Analysis"
    required: true
  - name: "§6 Re-Entry Signal"
    required: true
  - name: "§7 Recommended Actions"
    required: true
  - name: "§8 Adoption Evidence"
    required: true
  - name: "§9 Freeze Declaration"
    required: true

file_paths:
  spec: "docs/specs/es-spec.md"
  template: "docs/artifacts/es-template.md"
  prompt: "docs/prompts/es-prompt.md"
  validator: "docs/validators/es-validator.md"

upstream_dependencies:
  - artifact_type: RHR
    condition: "at least 2 frozen"
  - artifact_type: VH
    condition: "frozen (optional)"

downstream_consumers:
  - artifact_type: DI
    kit: PIK
