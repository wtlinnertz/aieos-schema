# Schema for SOER (SSK — Layer 3)
artifact_type: SOER
kit: SSK
layer: 3
spec_version: "v1.0"
entry_gate: false

hard_gates:
  - name: dprd_frozen
    rule: "DPRD ID referenced; DPRD status confirmed as Frozen; key functional requirements listed; non-functional requirements that constrain sourcing addressed"
  - name: owner_identified
    rule: "Named individual (not team) as sourcing evaluation owner with contact information and scope stated"
  - name: options_enumerated
    rule: "At least two sourcing options listed (Build + at least one Buy or Adopt alternative); each option has name, sourcing type, description, and initial viability assessment; no recommendation or ranking present"
  - name: criteria_defined
    rule: "At least six evaluation criteria categories addressed (cost, time-to-value, risk, functional fit, maintenance burden, lock-in); each criterion has name, definition, and weight; at least two criteria marked critical; criteria traceable to DPRD or organizational constraints"
  - name: no_premature_decision
    rule: "No recommendation, ranking, preferred option, or decision language present anywhere in the document; the SOER identifies and scopes, it does not evaluate or decide"

required_sections:
  - name: "Document Control"
    required: true
  - name: "Upstream Reference"
    required: true
  - name: "Sourcing Evaluation Owner"
    required: true
  - name: "Sourcing Options"
    required: true
  - name: "Evaluation Criteria"
    required: true
  - name: "Constraints and Assumptions"
    required: true
  - name: "Completeness Checklist"
    required: true
  - name: "Freeze Declaration"
    required: true

file_paths:
  spec: "docs/specs/soer-spec.md"
  template: "docs/artifacts/soer-template.md"
  prompt: "docs/prompts/soer-prompt.md"
  validator: "docs/validators/soer-validator.md"

upstream_dependencies:
  - artifact_type: DPRD
    condition: "frozen"

downstream_consumers:
  - artifact_type: VER
    kit: SSK
