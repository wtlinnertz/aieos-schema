# ISPEC — Infrastructure Specification
# Kit: PINFK (Platform & Infrastructure Kit), Layer 12
# Source: aieos-platform-infrastructure-kit/docs/specs/ispec-spec.md

artifact_type: ISPEC
kit: PINFK
layer: 12
spec_version: "v1.0"
entry_gate: false
cross_cutting: true

trigger_conditions:
  - "PDRs frozen — technology choices known; infrastructure definition needed for downstream kits (EEK, REK, RRK)"
  - "New version issued when compute, storage, networking, scaling, or DR strategy changes materially"

upstream_dependencies:
  - artifact_type: PDR
    condition: "frozen — provides technology choices"

downstream_consumers:
  - artifact_type: EM
    kit: PINFK
  - artifact_type: SMR
    kit: PINFK
  - artifact_type: ORD
    kit: EEK
  - artifact_type: RP
    kit: REK
  - artifact_type: SRP
    kit: RRK

hard_gates:
  - name: compute_specification
    rule: "Compute resource type, size (CPU/memory), count/range, and region/AZ requirements are specified"
    fail_examples:
      - "Compute type absent"
      - "Size specified as 'appropriate' rather than specific values"
      - "No region/AZ requirements"

  - name: storage_specification
    rule: "Storage type, size with units, backup policy (frequency, retention, location), and data classification are specified; IOPS stated or explicitly marked not applicable"
    fail_examples:
      - "Storage type absent"
      - "Size specified without units"
      - "Backup policy absent"

  - name: network_specification
    rule: "VPC/network design, load balancing, DNS, and firewall/security group rules are specified"
    fail_examples:
      - "No VPC/network design"
      - "Security group rules absent or 'default'"

  - name: scaling_rules
    rule: "Auto-scaling triggers with specific metric thresholds defined; both scale-out and scale-in rules present; min/max counts stated; cooldown period stated; rationale provided"
    fail_examples:
      - "Only scale-out rules defined (no scale-in)"
      - "Thresholds described qualitatively ('when load is high')"

  - name: cost_estimate
    rule: "Monthly cost with currency, breakdown by category, assumptions stated, cost at both minimum and maximum scale, date of estimate present"
    fail_examples:
      - "Total cost without breakdown"
      - "Only one scale point estimated"

  - name: disaster_recovery
    rule: "RPO and RTO stated with time units; failover mechanism described; backup restoration referenced; DR testing cadence stated"
    fail_examples:
      - "RPO or RTO absent"
      - "RPO/RTO stated without time units"
      - "No DR testing cadence"

required_sections:
  - name: Document Control
  - name: Compute Specification
  - name: Storage Specification
  - name: Network Specification
  - name: Scaling Rules
  - name: Cost Estimate
  - name: Disaster Recovery

file_paths:
  spec: docs/specs/ispec-spec.md
  template: docs/artifacts/ispec-template.md
  prompt: docs/prompts/ispec-prompt.md
  validator: docs/validators/ispec-validator.md
