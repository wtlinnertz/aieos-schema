# AIEOS Canonical Cross-Driver Lock — v1.0
#
# FR-019: the single on-disk ownership lock all three drivers (sherpa, console,
# dark factory) honor so a dark-factory run and a human in the console cannot
# write the same initiative's files concurrently. Defined ONCE here and
# implemented identically in Python (aieos-agent-harness src/lock.py) and
# TypeScript (aieos-console filesystem-service.ts).
#
# This is a REWRITE of the console's original .aieos/lock, not an extension
# (ADR-0002 amendment): the old primitive stored `hostname` but its liveness
# check ignored it and it had no lease, so a crashed unattended run wedged the
# initiative forever and a lock from another host was checked against a random
# local PID.
#
# Peer of meta-schema.yaml / document-control.yaml (a top-level, cross-cutting
# schema), so it is intentionally NOT swept by the per-kit conformance tests.
#
# References: ADR-0002 (dark factory; amendment naming FR-019 a rewrite),
# ADR-0004 (.aieos/halt andon stand-down reused for stale-lock takeover),
# v1.3 release plan Phase 3, decisions log Q3/Q4/Q5/Q6.

lock_version: "1.0"
record_name: "Cross-Driver Initiative Lock"
path: ".aieos/lock"           # JSON, one per initiative (whole-initiative granularity, Q3)

# The lock is whole-initiative: one owner at a time, single-writer by nature.
# It is NOT per-artifact.
granularity: whole-initiative

fields:
  lock_version:
    type: string
    required: true
    description: "Schema version of this lock record."

  initiative:
    type: string
    required: false
    description: "Initiative identifier the lock covers (informational; the lock file's location is authoritative)."

  owner:
    type: string
    required: true
    description: "Human or agent identity accountable for the holding session."

  driver:
    type: string
    required: true
    enum: [console, dark-factory, sherpa]
    description: "Which driver holds the lock. Sherpa honors the lock advisory-only for v1 (Q5)."

  session_id:
    type: string
    required: true
    description: >
      Unique per acquisition (UUID). This is the ownership token: renew and
      release verify session_id, NOT pid, so ownership survives PID reuse and
      cross-host handoff.

  hostname:
    type: string
    required: true
    description: >
      Host that acquired the lock. A pid is only meaningful on the host that
      wrote it, so liveness (process-exists) is consulted ONLY when hostname
      matches the checking host. Across hosts, staleness is decided by the lease.

  pid:
    type: integer
    required: true
    description: "Process id on `hostname`. Advisory, hostname-scoped liveness only."

  acquired_at:
    type: string
    format: date-time
    required: true
    description: "ISO 8601 UTC (YYYY-MM-DDTHH:MM:SSZ) when the lock was first taken."

  renewed_at:
    type: string
    format: date-time
    required: true
    description: >
      ISO 8601 UTC heartbeat timestamp, refreshed every heartbeat_interval_seconds.
      A lock is expired (and takeable) when now - renewed_at > lease_ttl_seconds.

  lease_ttl_seconds:
    type: integer
    required: true
    default: 300
    description: "Lease length (Q4: 5 minutes). A crashed run frees itself within this window."

  heartbeat_interval_seconds:
    type: integer
    required: true
    default: 60
    description: "Heartbeat cadence (Q4: 60s). Must be well below lease_ttl_seconds."

# Rules both language implementations enforce.
constraints:
  - id: session_id_is_ownership
    rule: "renew and release succeed only when the caller's session_id matches the on-disk session_id"
  - id: hostname_scoped_liveness
    rule: "pid liveness is consulted only when hostname == checking host; cross-host staleness is lease-only"
  - id: lease_expiry_takeover
    rule: "a lock with now - renewed_at > lease_ttl_seconds is expired and may be taken over"
  - id: takeover_writes_halt
    rule: "taking over an existing (expired or same-host-dead-pid) lock writes the .aieos/halt andon stand-down sentinel (ADR-0004) so a possibly-live prior owner stands down (Q6)"
  - id: not_a_freeze
    rule: "acquiring, renewing, releasing, or taking over the lock never writes FROZEN and never routes through apply_freeze_decision"
  - id: frozen_boundary_handoff
    rule: "clean cross-driver handoff happens only at frozen artifact boundaries; mid-convergence is not a safe switch point in v1"

maps_to:
  python_impl: "aieos-agent-harness/src/lock.py (acquire_lock/renew_lock/release_lock/read_lock/is_takeable)"
  typescript_impl: "aieos-console/src/lib/services/filesystem-service.ts (acquireLock/renewLock/releaseLock)"
  halt_sentinel: ".aieos/halt (ADR-0004 andon stand-down)"
  sherpa_enforcement: "advisory-only for v1 (Q5); documented limitation in aieos-sherpa/sherpa-prompt.md"
