# PMR — Postmortem Record
# Kit: ODK (Operational Diagnostics Kit), Layer 8
# Source: aieos-operational-diagnostics-kit/docs/specs/pmr-spec.md

artifact_type: PMR
kit: ODK
layer: 8
spec_version: "v1.0"
entry_gate: false
cross_cutting: true

trigger_conditions:
  - "INR frozen after incident investigation is complete and service is resolved"

upstream_dependencies:
  - artifact_type: INR
    condition: "frozen"
  - artifact_type: SRP
    condition: "optional — from RRK, for SLO impact calculation"

downstream_consumers:
  - artifact_type: RB
    kit: ODK
  - artifact_type: RHR
    kit: RRK
  - artifact_type: SKA
    kit: DKK

hard_gates:
  - name: incident_reference
    rule: "INR ID present and confirmed Frozen; severity from enumerated list (SEV1 | SEV2 | SEV3 | SEV4); duration in clock time with number"
    fail_examples:
      - "INR ID absent"
      - "Duration stated as 'several hours' — no number"
      - "Severity stated as 'Critical' — non-enumerated value"

  - name: timeline
    rule: "Chronological sequence from first signal to resolution; events timestamped with date and time; first signal, mitigation, and restoration identifiable"
    fail_examples:
      - "Events not in chronological order"
      - "Timeline jumps from symptom to resolution with no intermediate events"

  - name: root_cause
    rule: "Primary root cause stated; at least one contributing factor (not 'human error' alone); systemic factors assessed (may be 'none identified' with explanation, not blank)"
    fail_examples:
      - "Root cause section blank"
      - "'Human error' as the only finding with no systemic analysis"

  - name: slo_impact
    rule: "SLO impact quantified per affected SLO (error budget consumed in time and percentage, remaining budget stated), OR 'no SLOs affected' stated explicitly with reasoning; section not blank"
    fail_examples:
      - "Section blank"
      - "Budget consumption in percentage only, without time equivalent"
      - "'N/A' without explanation"

  - name: corrective_actions
    rule: "At least one corrective action with named owner (individual), specific target date, and valid tracking reference; action grounded in root cause findings"
    fail_examples:
      - "All actions assigned to 'the team' — no named owner"
      - "Target dates stated as 'next sprint' or 'soon'"
      - "Tracking references listed as 'TBD'"

  - name: lessons_learned
    rule: "At least one specific, traceable lesson stated; not blank; not a restatement of corrective actions; not generic"
    fail_examples:
      - "Generic lessons ('communicate better', 'improve monitoring') without specifics"
      - "Lessons that are restatements of corrective actions"

required_sections:
  - name: Document Control
  - name: Incident Reference
  - name: Timeline
  - name: Root Cause Analysis
  - name: SLO Impact
  - name: Corrective Actions
  - name: Lessons Learned
  - name: Cross-Kit Actions
  - name: Freeze Declaration

file_paths:
  spec: docs/specs/pmr-spec.md
  template: docs/artifacts/pmr-template.md
  prompt: docs/prompts/pmr-prompt.md
  validator: docs/validators/pmr-validator.md
