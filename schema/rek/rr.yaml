# Schema for RR (REK — Layer 5)
artifact_type: RR
kit: REK
layer: 5
spec_version: "v1.0"
entry_gate: false

hard_gates:
  - name: release_summary
    rule: "Outcome declared from enumerated list; strategy stated; final exposure percentage documented; deviation from RP strategy explained if different"
  - name: deployment_evidence
    rule: "Each RP deployment step has a corresponding evidence entry; evidence is concrete (not assertions); deviations from RP documented with rationale"
  - name: exposure_log
    rule: "Each RP exposure stage has an entry; signals observed stated as metric values; decision + who made it documented for each stage; pauses and resolutions documented"
  - name: monitoring_observations
    rule: "Metrics reported with specific values and timestamps for full watch period; alerts documented with responses; final values present"
  - name: release_disposition
    rule: "Final state declared from enumerated list; current exposure state documented; active flag states listed; rollback trigger or abandonment reason documented if applicable"
  - name: handoff_declaration
    rule: "What is in production stated; monitoring active listed; SLO baseline referenced; open incidents assessed; Layer 6 recommended watch items listed"

required_sections:
  - name: "Document Control"
    required: true
  - name: "Release Summary"
    required: true
  - name: "Deployment Evidence"
    required: true
  - name: "Exposure Log"
    required: true
  - name: "Monitoring Observations"
    required: true
  - name: "Release Disposition"
    required: true
  - name: "Handoff to Layer 6"
    required: true

file_paths:
  spec: "docs/specs/rr-spec.md"
  template: "docs/artifacts/rr-template.md"
  prompt: "docs/prompts/rr-prompt.md"
  validator: "docs/validators/rr-validator.md"

upstream_dependencies:
  - artifact_type: RP
    condition: "frozen"

downstream_consumers:
  - artifact_type: SRER
    kit: RRK
