# Schema for EL (PIK — Layer 2)
artifact_type: EL
kit: PIK
layer: 2
spec_version: "v1.0"
entry_gate: false

hard_gates:
  - name: experiment_present
    rule: "At least one experiment documented with complete structure (target assumption, method, sample, findings, conclusion, confidence, limitations)"
  - name: assumption_traceability
    rule: "Every experiment traces to a specific AR assumption (ASM-N); every high-risk AR assumption is addressed"
  - name: evidence_based_conclusions
    rule: "Conclusions are supported by documented findings; no unsupported claims"
  - name: impact_assessed
    rule: "All invalidated or partially confirmed assumptions have documented impact on the initiative"
  - name: no_scope_expansion
    rule: "No expansion beyond the scope of upstream artifacts"
  - name: no_solutions
    rule: "No solution proposals, architecture, or implementation details present"

required_sections:
  - name: "1. Document Control"
    required: true
  - name: "2. Upstream References"
    required: true
  - name: "3. Experiment Inventory"
    required: true
  - name: "4. Results Summary"
    required: true
  - name: "5. Assumption Status Update"
    required: true
  - name: "6. Impact Assessment"
    required: true
  - name: "7. Recommendations"
    required: true
  - name: "8. Open Questions"
    required: true
  - name: "9. Freeze Declaration"
    required: true

file_paths:
  spec: "docs/specs/experiment-log-spec.md"
  template: "docs/artifacts/experiment-log-template.md"
  prompt: "docs/prompts/experiment-log-prompt.md"
  validator: "docs/validators/experiment-log-validator.md"

upstream_dependencies:
  - artifact_type: PFD
    condition: "frozen"
  - artifact_type: VH
    condition: "frozen"
  - artifact_type: AR
    condition: "frozen"

downstream_consumers:
  - artifact_type: DPRD
    kit: PIK
