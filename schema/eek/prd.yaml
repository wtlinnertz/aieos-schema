# Schema for PRD (EEK — Layer 4)
artifact_type: PRD
kit: EEK
layer: 4
spec_version: "v1.0"
entry_gate: false

hard_gates:
  - name: problem_definition
    rule: "Clear problem statement with identified users and rationale"
  - name: goals
    rule: "Explicit goals with measurable success criteria"
  - name: scope
    rule: "In-scope clearly defined, explicit non-goals, no implied scope"
  - name: requirements
    rule: "Functional and non-functional requirements explicitly stated"
  - name: constraints
    rule: "Constraints and assumptions documented"
  - name: readiness
    rule: "No unresolved critical questions, internally consistent"

required_sections:
  - name: "Document Control"
    required: true
  - name: "Problem Statement"
    required: true
  - name: "Goals (What 'Success' Means)"
    required: true
  - name: "Non-Goals (Hard Exclusions)"
    required: true
  - name: "Users / Personas"
    required: true
  - name: "Requirements (Functional and Non-Functional)"
    required: true
  - name: "Constraints (Hard Guardrails)"
    required: true
  - name: "Assumptions"
    required: true
  - name: "Out of Scope by Default"
    required: true
  - name: "Open Questions"
    required: true
  - name: "Acceptance / Success Criteria"
    required: true
  - name: "Freeze Declaration"
    required: true

file_paths:
  spec: "docs/specs/prd-spec.md"
  template: "docs/artifacts/prd-template.md"
  prompt: "docs/prompts/prd-prompt.md"
  validator: "docs/validators/prd-validator.md"

upstream_dependencies:
  - artifact_type: DPRD
    condition: "frozen (Path A)"

downstream_consumers:
  - artifact_type: SAD
    kit: EEK
