# Schema for Impact Analysis (EEK — Layer 4)
artifact_type: IA
kit: EEK
layer: 4
spec_version: "v1.0"
entry_gate: false

hard_gates:
  - name: downstream_artifact_impact
    rule: "Every downstream artifact in the chain is accounted for with severity and reason"
  - name: work_item_impact
    rule: "WDD work items tracing to affected content are identified with severity"
  - name: constraint_impact
    rule: "ACF/DCF constraint changes are traced to all inheriting downstream artifacts"
  - name: non_goal_impact
    rule: "PRD non-goal changes are traced to downstream scope boundaries"
  - name: addendum_cascade
    rule: "Downstream addendum conflicts are assessed"
  - name: report_completeness
    rule: "Change target specified, impacted artifacts array present, hard gates present, re_entry_required and estimated_cascade_depth present"

required_sections:
  - name: "Change Target"
    required: true
  - name: "Impacted Artifacts"
    required: true
  - name: "Impacted Work Items"
    required: true
  - name: "Hard Gate Results"
    required: true
  - name: "Re-Entry Decision"
    required: true

file_paths:
  spec: "docs/specs/impact-analysis-spec.md"
  template: "docs/artifacts/impact-analysis-template.md"
  prompt: "docs/prompts/impact-analysis-prompt.md"
  validator: "docs/validators/impact-analysis-validator.md"

upstream_dependencies:
  - artifact_type: PRD
    condition: "frozen"
  - artifact_type: ACF
    condition: "frozen"
  - artifact_type: SAD
    condition: "frozen"
  - artifact_type: DCF
    condition: "frozen"
  - artifact_type: TDD
    condition: "frozen"

downstream_consumers: []
