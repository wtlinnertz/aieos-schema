# Schema for Execution (EEK — Layer 4)
artifact_type: EXEC
kit: EEK
layer: 4
spec_version: "v1.1"
entry_gate: false

hard_gates: []
# Note: The execution spec defines the four-phase execution process
# (Tests -> Plan -> Code -> Review) but does not define hard gates
# in the standard validator format. Execution quality is enforced
# through the review checks (24 checks in Phase 4) rather than
# standalone hard gates. The execution-spec governs process, not
# a discrete artifact.

required_sections:
  - name: "Phase 1: Tests"
    required: true
  - name: "Phase 2: Plan"
    required: true
  - name: "Phase 3: Code"
    required: true
  - name: "Phase 4: Review"
    required: true

file_paths:
  spec: "docs/specs/execution-spec.md"
  template: "docs/artifacts/execution-template.md"
  prompt: "docs/prompts/execution-plan-prompt.md"
  validator: "docs/validators/execution-validator.md"

upstream_dependencies:
  - artifact_type: WDD
    condition: "frozen, DoR-validated"
  - artifact_type: TDD
    condition: "frozen"
  - artifact_type: DCF
    condition: "frozen"
  - artifact_type: ACF
    condition: "frozen"

downstream_consumers:
  - artifact_type: ORD
    kit: EEK
