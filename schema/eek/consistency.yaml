# Schema for Consistency Check (EEK — Layer 4)
artifact_type: CONS
kit: EEK
layer: 4
spec_version: "v1.0"
entry_gate: false

hard_gates:
  - name: requirement_coverage
    rule: "Every PRD requirement maps to at least one SAD component"
  - name: requirement_to_work
    rule: "Every functional requirement traces to at least one WDD work item"
  - name: scope_containment
    rule: "No downstream artifact introduces unauthorized scope"
  - name: non_goal_enforcement
    rule: "No downstream artifact contradicts stated non-goals"
  - name: constraint_propagation
    rule: "No downstream artifact violates ACF constraints"
  - name: interface_alignment
    rule: "SAD integration points match TDD specifications"
  - name: addendum_integration
    rule: "Frozen addendum changes reflected downstream"
  - name: boundary_consistency
    rule: "SAD boundaries, data ownership, and failure modes align with TDD specifications"
  - name: report_completeness
    rule: "Artifacts checked list populated, traceability matrix has non-zero totals, inconsistencies array present"

required_sections:
  - name: "Artifacts Checked"
    required: true
  - name: "Traceability Matrix"
    required: true
  - name: "Inconsistencies"
    required: true
  - name: "Hard Gate Results"
    required: true

file_paths:
  spec: "docs/specs/consistency-spec.md"
  template: "docs/artifacts/consistency-template.md"
  prompt: "docs/prompts/consistency-prompt.md"
  validator: "docs/validators/consistency-validator.md"

upstream_dependencies:
  - artifact_type: PRD
    condition: "frozen"
  - artifact_type: ACF
    condition: "frozen"
  - artifact_type: SAD
    condition: "frozen"
  - artifact_type: DCF
    condition: "frozen"
  - artifact_type: TDD
    condition: "frozen"
  - artifact_type: WDD
    condition: "validated"

downstream_consumers: []
