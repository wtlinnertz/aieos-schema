# Schema for IR (RRK — Layer 6)
artifact_type: IR
kit: RRK
layer: 6
spec_version: "v1.0"
entry_gate: false

hard_gates:
  - name: incident_classification
    rule: "Severity from enumerated list (SEV1–SEV4); service named; detection method from enumerated list; detection timestamp present"
  - name: impact_statement
    rule: "Users affected as count, percentage, or 'internal only'; affected functionality named specifically; duration in clock time"
  - name: timeline
    rule: "Chronological events from detection to resolution; each timestamped; named responders where actions were taken; mitigation and resolution identifiable"
  - name: root_cause
    rule: "Proximate cause identified; at least one contributing factor beyond 'human error'; systemic factors assessed (may be 'none identified' — not blank)"
  - name: remediation
    rule: "Immediate fix documented with confirmation of restoration; at least one follow-up action with named owner, specific deadline, and tracking reference"
  - name: slo_impact
    rule: "Affected SLOs identified; budget consumed in minutes or percentage; remaining budget stated; policy implication per SRP §3 stated; if no SLOs affected, stated explicitly with reasoning"

required_sections:
  - name: "Document Control"
    required: true
  - name: "Incident Classification"
    required: true
  - name: "Impact Statement"
    required: true
  - name: "Incident Timeline"
    required: true
  - name: "Root Cause Analysis"
    required: true
  - name: "Remediation"
    required: true
  - name: "SLO Impact"
    required: true

file_paths:
  spec: "docs/specs/ir-spec.md"
  template: "docs/artifacts/ir-template.md"
  prompt: "docs/prompts/ir-prompt.md"
  validator: "docs/validators/ir-validator.md"

upstream_dependencies:
  - artifact_type: SRP
    condition: "frozen"

downstream_consumers:
  - artifact_type: RHR
    kit: RRK
